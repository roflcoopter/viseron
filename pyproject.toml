[tool.ruff]
target-version = "py310"
line-length = 88
src = ["viseron", "tests", "scripts"]
include = ["viseron/**/*.py", "tests/**/*.py", "scripts/**/*.py", "manager.py"]

[tool.ruff.lint]
select = [
    "AIR",    ## Airflow
    "ERA",    ## eradicate
    "FAST",   ## FastAPI
    "YTT",    ## flake8-2020
    "ANN",    ## flake8-annotations
    "ASYNC",  ## flake8-async
    "S",      ## flake8-bandit
    "BLE",    ## flake8-blind-except
    "FBT",    ## flake8-boolean-trap
    "B",      ## flake8-bugbear
    "A",      ## flake8-builtins
    "COM",    ## flake8-commas
    "C4",     ## flake8-comprehensions
    "CPY",    ## flake8-copyright
    "DTZ",    ## flake8-datetimez
    "T10",    ## flake8-debugger
    "DJ",     ## flake8-django
    "EM",     ## flake8-errmsg
    "EXE",    ## flake8-executable
    "FIX",    ## flake8-fixme
    "FA",     ## flake8-future-annotations
    "INT",    ## flake8-gettext
    "ISC",    ## flake8-implicit-str-concat
    "ICN",    ## flake8-import-conventions
    "LOG",    ## flake8-logging
    "G",      ## flake8-logging-format
    "INP",    ## flake8-no-pep420
    "PIE",    ## flake8-pie
    "T20",    ## flake8-print
    "PYI",    ## flake8-pyi
    "PT",     ## flake8-pytest-style
    "Q",      ## flake8-quotes
    "RSE",    ## flake8-raise
    "RET",    ## flake8-return
    "SLF",    ## flake8-self
    "SIM",    ## flake8-simplify
    "SLOT",   ## flake8-slots
    "TID",    ## flake8-tidy-imports
    "TD",     ## flake8-todos
    "TC",     ## flake8-type-checking
    "ARG",    ## flake8-unused-arguments
    "PTH",    ## flake8-use-pathlib
    "FLY",    ## flynt
    "I",      ## isort
    "C90",    ## mccabe
    "NPY",    ## NumPy-specific rules
    "PD",     ## pandas-vet
    "N",      ## pep8-naming
    "PERF",   ## Perflint
    "E", "W", ## pycodestyle
    "DOC",    ## pydoclint
    "D",      ## pydocstyle
    "F",      ## Pyflakes
    "PGH",    ## pygrep-hooks
    "PL",     ## Pylint
    "UP",     ## pyupgrade
    "FURB",   ## refurb
    "RUF",    ## Ruff-specific rules
    "TRY",    ## tryceratops
]


ignore = [
    # Real ignores
    "PTH",     ##  https://docs.astral.sh/ruff/rules/#flake8-use-pathlib-pth Disabled since we prefer os.path for path handling
    "COM812",  ##  https://docs.astral.sh/ruff/rules/missing-trailing-comma/
    "G004",    ##  https://docs.astral.sh/ruff/rules/logging-f-string/ Disabled since we prefer f-strings for logging, except for certain log messages that are very frequent
    "EM102",   ##  https://docs.astral.sh/ruff/rules/f-string-in-exception/ Disabled since we prefer f-strings
    "EM101",   ##  https://docs.astral.sh/ruff/rules/raw-string-in-exception/ Disabled for simplicity
    "PLR0911", ##  https://docs.astral.sh/ruff/rules/too-many-return-statements/ # Disabled for readability
    "PLR0912", ##  https://docs.astral.sh/ruff/rules/too-many-branches/ # Disabled for readability
    "PLR0913", ##  https://docs.astral.sh/ruff/rules/too-many-arguments/ # Disabled for readability
    "PLR0915", ##  https://docs.astral.sh/ruff/rules/too-many-statements/ # Disabled for readability
    "D107",    ##  https://docs.astral.sh/ruff/rules/undocumented-public-init/ Disabled since we document the class instead of the __init__ method
    "PERF203", ##  https://docs.astral.sh/ruff/rules/try-except-in-loop/ Disabled since it is used extensively with queue operations
    "TRY003",  ##  https://docs.astral.sh/ruff/rules/raise-vanilla-args/ Disabled for simplicity
    "TRY400",  ##  https://docs.astral.sh/ruff/rules/error-instead-of-exception/ Disabled because most of the time logger.error is enough
    "SIM105",  ##  https://docs.astral.sh/ruff/rules/suppressible-exception/ Disabled for performance reasons
    "S603",    ##  https://docs.astral.sh/ruff/rules/subprocess-without-shell-equals-true/ Contradicts S602
    "ANN401",  ##  https://docs.astral.sh/ruff/rules/any-type/ Disabled since Any is useful in some cases
    "C901",    ##  https://docs.astral.sh/ruff/rules/complex-structure/ Disabled for readability
    "ASYNC110", ##  https://docs.astral.sh/ruff/rules/async-busy-wait/ Disabled because we dont use it to wait for events
    # To be attended to
    "ANN001",  ##   795   https://docs.astral.sh/ruff/rules/missing-type-function-argument/
