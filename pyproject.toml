[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.isort]
known-first-party = ["viseron","tests","manager"]
combine-as-imports = true
forced-separate = ["tests"]

[tool.ruff.lint.per-file-ignores]
# Relax rules in tests
"tests/**" = [
    "S101",    ##  https://docs.astral.sh/ruff/rules/assert/
    "S105",    ##  https://docs.astral.sh/ruff/rules/hardcoded-password-string/
    "SLF001",  ##  https://docs.astral.sh/ruff/rules/private-member-access/
    "PLR2004", ##  https://docs.astral.sh/ruff/rules/magic-value-comparison/
    "ANN201",  ##  https://docs.astral.sh/ruff/rules/missing-return-type-undocumented-public-function/
    "FBT001",  ##  https://docs.astral.sh/ruff/rules/boolean-type-hint-positional-argument/
]

# Generation of docs use many long lines, so we disable line length rule for scripts/gen_docs
"scripts/gen_docs/**" = ["E501"]

# Relax rules in scripts
"scripts/**" = [
    "D",
    "T201",    ##  https://docs.astral.sh/ruff/rules/print/
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.ruff.lint.flake8-import-conventions.extend-aliases]
voluptuous = "vol"
